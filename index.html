<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ TWICE Polaroid Cam ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --pink: #ff6eb4;
    --blue: #7ec8e3;
    --yellow: #ffe066;
    --purple: #c9a0ff;
    --white: #fff9fe;
    --shadow: #ff6eb455;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #ffe0f7 0%, #d0eeff 50%, #fffbe6 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: var(--pink);
    text-shadow: 2px 2px 0 var(--purple), 4px 4px 0 var(--blue);
    letter-spacing: 2px;
    margin: 10px 0 4px;
  }
  .subtitle {
    font-size: 0.8rem;
    color: var(--purple);
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  /* CAMERA CARD */
  .cam-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 3px solid var(--pink);
    box-shadow: 0 8px 32px var(--shadow), 0 0 0 6px rgba(255,110,180,0.1);
    padding: 16px;
    width: 100%;
    max-width: 400px;
  }

  /* VIEWFINDER */
  .viewfinder-wrap {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 3/4;
  }

  #video, #photoCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }

  #photoCanvas { display: none; z-index: 2; }

  .frame-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
    border-radius: 16px;
  }
  .frame-overlay img {
    width: 100%; height: 100%;
    object-fit: fill;
  }

  /* FILTER OVERLAYS */
  .filter-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 4;
    pointer-events: none;
    border-radius: 16px;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .filter-overlay.y2k {
    background: radial-gradient(ellipse at 30% 20%, rgba(255,240,200,0.45) 0%, rgba(255,180,220,0.25) 40%, transparent 70%),
                linear-gradient(135deg, rgba(255,255,240,0.25) 0%, rgba(220,200,255,0.2) 100%);
    opacity: 1;
  }
  .filter-bw { filter: grayscale(100%) sepia(30%) contrast(1.1); }
  .filter-y2k-css { filter: brightness(1.15) saturate(1.3) contrast(0.92) sepia(0.1); }

  /* COUNTDOWN */
  .countdown-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  .countdown-num {
    font-family: 'Pacifico', cursive;
    font-size: 7rem;
    color: white;
    text-shadow: 0 0 30px var(--pink), 0 4px 0 var(--purple);
    opacity: 0;
    transform: scale(2);
    transition: opacity 0.2s, transform 0.2s;
  }
  .countdown-num.show {
    opacity: 1;
    transform: scale(1);
    animation: countPop 0.8s forwards;
  }
  @keyframes countPop {
    0% { transform: scale(1.4); opacity: 1; }
    80% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* FLASH */
  .flash {
    position: absolute; inset: 0;
    background: white;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    border-radius: 16px;
  }
  .flash.go { animation: flashAnim 0.4s forwards; }
  @keyframes flashAnim {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 8px;
  }

  .btn {
    border: none;
    cursor: pointer;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn:active { transform: scale(0.92); }

  .btn-shutter {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), #ff9de2);
    box-shadow: 0 4px 16px var(--shadow), 0 0 0 4px white, 0 0 0 7px var(--pink);
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .btn-shutter:hover { box-shadow: 0 6px 24px var(--shadow), 0 0 0 4px white, 0 0 0 7px var(--pink); transform: scale(1.05); }

  .btn-sm {
    padding: 10px 14px;
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--pink);
    color: var(--pink);
    font-size: 1.1rem;
    border-radius: 50%;
    width: 48px; height: 48px;
  }
  .btn-sm:hover { background: var(--pink); color: white; }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .filter-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--blue);
    background: white;
    color: var(--blue);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab.active {
    background: var(--blue);
    color: white;
    box-shadow: 0 2px 8px rgba(126,200,227,0.5);
  }

  /* POLAROID OUTPUT */
  .polaroid-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    width: 100%;
    max-width: 400px;
  }
  .polaroid-wrap.show { display: flex; }

  .polaroid-card {
    background: white;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.1);
    padding: 12px 12px 48px;
    width: 280px;
    position: relative;
    animation: polaroidReveal 1.2s cubic-bezier(.17,.67,.35,1.3) forwards;
    transform: translateY(60px) rotate(-3deg);
    opacity: 0;
  }
  @keyframes polaroidReveal {
    0% { transform: translateY(60px) rotate(-3deg); opacity: 0; }
    60% { transform: translateY(-10px) rotate(1deg); opacity: 1; }
    100% { transform: translateY(0) rotate(-1.5deg); opacity: 1; }
  }

  .polaroid-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
  }
  .polaroid-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .polaroid-frame-img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: fill;
    pointer-events: none;
  }

  .polaroid-label {
    text-align: center;
    margin-top: 8px;
    font-family: 'Pacifico', cursive;
    font-size: 1rem;
    color: #ff6eb4;
  }

  .action-btns {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .btn-action {
    padding: 10px 22px;
    border-radius: 20px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-action:active { transform: scale(0.94); }
  .btn-download {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    box-shadow: 0 4px 12px rgba(255,110,180,0.4);
  }
  .btn-retake {
    background: white;
    border: 2px solid var(--blue);
    color: var(--blue);
  }

  /* FRAME STRIP */
  .frame-strip {
    display: none;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 0;
    margin-top: 10px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .frame-strip.show { display: flex; }
  .frame-thumb {
    flex-shrink: 0;
    width: 54px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    border: 3px solid transparent;
    cursor: pointer;
    scroll-snap-align: start;
    transition: border-color 0.2s, transform 0.2s;
  }
  .frame-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .frame-thumb.selected { border-color: var(--pink); transform: scale(1.08); }

  /* DECORATIONS */
  .deco { position: fixed; pointer-events: none; z-index: 0; font-size: 1.5rem; animation: floatDeco 4s ease-in-out infinite; }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(8deg); }
  }

  input[type=file] { display: none; }

  .star { color: var(--yellow); font-style: normal; }
  
  /* shake on photo taken */
  @keyframes shake {
    0%,100% { transform: rotate(-1.5deg); }
    25% { transform: rotate(2deg) translateX(4px); }
    75% { transform: rotate(-2deg) translateX(-4px); }
  }
</style>
</head>
<body>

<span class="deco" style="top:8%;left:5%;animation-delay:0s">💫</span>
<span class="deco" style="top:15%;right:8%;animation-delay:1s">🌸</span>
<span class="deco" style="top:60%;left:3%;animation-delay:2s">✨</span>
<span class="deco" style="top:75%;right:5%;animation-delay:0.5s">💗</span>

<h1>✦ TWICE CAM ✦</h1>
<p class="subtitle">✿ This Is For ONCE ✿</p>

<div class="cam-card">
  <div class="viewfinder-wrap" id="viewfinderWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="photoCanvas"></canvas>
    <div class="filter-overlay" id="filterOverlay"></div>
    <div class="frame-overlay" id="frameOverlay"><img id="frameImg" src="" alt="" style="display:none"></div>
    <div class="countdown-overlay"><span class="countdown-num" id="countNum"></span></div>
    <div class="flash" id="flash"></div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="normal" onclick="setFilter('normal',this)">🎨 彩色</button>
    <button class="filter-tab" data-filter="y2k" onclick="setFilter('y2k',this)">💖 Y2K</button>
    <button class="filter-tab" data-filter="bw" onclick="setFilter('bw',this)">🖤 黑白復古</button>
  </div>

  <!-- Frame strip -->
  <div class="frame-strip" id="frameStrip"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-sm" id="flipBtn" title="翻轉鏡頭" onclick="flipCamera()">🔄</button>
    <button class="btn btn-shutter" id="shutterBtn" onclick="startCountdown()">📷</button>
    <label class="btn btn-sm" title="上傳照片" for="uploadInput">🖼️</label>
    <input type="file" id="uploadInput" accept="image/*" onchange="handleUpload(event)">
  </div>
</div>

<!-- Polaroid output -->
<div class="polaroid-wrap" id="polaroidWrap">
  <div class="polaroid-card" id="polaroidCard">
    <div class="polaroid-img-wrap">
      <img id="polaroidPhoto" class="polaroid-photo" src="" alt="photo">
      <img id="polaroidFrame" class="polaroid-frame-img" src="" alt="">
    </div>
    <div class="polaroid-label">♡ for ONCE ♡</div>
  </div>
  <div class="action-btns">
    <button class="btn-action btn-download" onclick="downloadPhoto()">💾 儲存照片</button>
    <button class="btn-action btn-retake" onclick="retake()">🔁 重拍</button>
  </div>
</div>

// Frame names for display
const FRAME_NAMES = ["Sweet ONCE","Y2K Cam","Dreamy","TIF Blue","Oval","Bear","Yellow Pola","Blue Pola","Green Pola"];

let currentStream = null;
let facingMode = "user";
let currentFilter = "normal";
let selectedFrame = 0;
let countdownTimer = null;

const video = document.getElementById("video");
const photoCanvas = document.getElementById("photoCanvas");
const filterOverlay = document.getElementById("filterOverlay");
const frameImg = document.getElementById("frameImg");
const countNum = document.getElementById("countNum");
const flash = document.getElementById("flash");
const frameStrip = document.getElementById("frameStrip");

// Init frames strip
function initFrameStrip() {
  frameStrip.innerHTML = "";
  // Add "None" option
  const noneThumb = document.createElement("div");
  noneThumb.className = "frame-thumb selected";
  noneThumb.innerHTML = '<div style="width:100%;height:100%;background:linear-gradient(135deg,#ffe0f7,#d0eeff);display:flex;align-items:center;justify-content:center;font-size:1.4rem">🚫</div>';
  noneThumb.onclick = () => selectFrame(-1);
  noneThumb.id = "thumb-1";
  frameStrip.appendChild(noneThumb);

  FRAMES.forEach((src, i) => {
    const div = document.createElement("div");
    div.className = "frame-thumb";
    div.id = "thumb" + i;
    const img = document.createElement("img");
    img.src = src;
    img.alt = FRAME_NAMES[i];
    div.appendChild(img);
    div.onclick = () => selectFrame(i);
    frameStrip.appendChild(div);
  });
  frameStrip.classList.add("show");
}

function selectFrame(i) {
  selectedFrame = i;
  document.querySelectorAll(".frame-thumb").forEach(t => t.classList.remove("selected"));
  const id = i === -1 ? "thumb-1" : "thumb" + i;
  document.getElementById(id)?.classList.add("selected");
  if (i === -1) {
    frameImg.style.display = "none";
  } else {
    frameImg.src = FRAMES[i];
    frameImg.style.display = "block";
  }
}

// Camera
async function startCamera() {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1600 } },
      audio: false
    });
    video.srcObject = currentStream;
    video.style.display = "block";
    photoCanvas.style.display = "none";
    if (facingMode === "user") video.style.transform = "scaleX(-1)";
    else video.style.transform = "scaleX(1)";
  } catch(e) {
    console.warn("Camera error:", e);
  }
}

function flipCamera() {
  facingMode = facingMode === "user" ? "environment" : "user";
  startCamera();
}

// Filter
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  applyLiveFilter();
}

function applyLiveFilter() {
  video.style.filter = "";
  filterOverlay.className = "filter-overlay";
  if (currentFilter === "bw") video.style.filter = "grayscale(100%) sepia(30%) contrast(1.1)";
  if (currentFilter === "y2k") {
    video.style.filter = "brightness(1.15) saturate(1.3) contrast(0.92) sepia(0.1)";
    filterOverlay.classList.add("y2k");
  }
}

// Countdown
function startCountdown() {
  if (countdownTimer) return;
  document.getElementById("shutterBtn").disabled = true;
  let count = 3;
  function tick() {
    countNum.textContent = count;
    countNum.classList.remove("show");
    void countNum.offsetWidth;
    countNum.classList.add("show");
    if (count === 0) {
      setTimeout(() => { capturePhoto(); countdownTimer = null; document.getElementById("shutterBtn").disabled = false; }, 800);
      return;
    }
    count--;
    countdownTimer = setTimeout(tick, 900);
  }
  tick();
}

function capturePhoto() {
  // Flash
  flash.classList.remove("go");
  void flash.offsetWidth;
  flash.classList.add("go");

  // Draw to canvas
  photoCanvas.width = video.videoWidth || 640;
  photoCanvas.height = video.videoHeight || 853;
  const ctx = photoCanvas.getContext("2d");

  // Mirror if front cam
  if (facingMode === "user") {
    ctx.translate(photoCanvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);
  if (facingMode === "user") ctx.setTransform(1,0,0,1,0,0);

  applyFilterToCanvas(ctx, photoCanvas.width, photoCanvas.height);
  showPolaroid(photoCanvas.toDataURL("image/jpeg", 0.92));
}

function applyFilterToCanvas(ctx, w, h) {
  if (currentFilter === "bw") {
    const id = ctx.getImageData(0,0,w,h);
    const d = id.data;
    for (let i=0;i<d.length;i+=4) {
      const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
      const s = Math.min(255, g * 1.05 + 10); // slight sepia-like
      d[i]=s; d[i+1]=s*0.95; d[i+2]=s*0.88;
    }
    ctx.putImageData(id,0,0);
  } else if (currentFilter === "y2k") {
    // Brightness + saturation simulation + soft pink tint
    const id = ctx.getImageData(0,0,w,h);
    const d = id.data;
    for (let i=0;i<d.length;i+=4) {
      // Boost brightness
      d[i]   = Math.min(255, d[i]   * 1.15 + 15);
      d[i+1] = Math.min(255, d[i+1] * 1.1  + 8);
      d[i+2] = Math.min(255, d[i+2] * 1.12 + 20);
      // Slight pink tint
      d[i]   = Math.min(255, d[i]   * 1.05 + 5);
    }
    ctx.putImageData(id,0,0);
    // Soft glow overlay
    ctx.globalAlpha = 0.18;
    const g = ctx.createRadialGradient(w*0.3,h*0.2,0,w*0.5,h*0.4,w*0.7);
    g.addColorStop(0,"rgba(255,240,200,1)");
    g.addColorStop(0.5,"rgba(255,180,220,0.5)");
    g.addColorStop(1,"rgba(220,200,255,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);
    ctx.globalAlpha = 1;
  }
}

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      photoCanvas.width = img.width;
      photoCanvas.height = img.height;
      const ctx = photoCanvas.getContext("2d");
      ctx.drawImage(img,0,0);
      applyFilterToCanvas(ctx, img.width, img.height);
      showPolaroid(photoCanvas.toDataURL("image/jpeg", 0.92));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showPolaroid(dataUrl) {
  document.getElementById("polaroidPhoto").src = dataUrl;
  document.getElementById("polaroidFrame").src = selectedFrame >= 0 ? FRAMES[selectedFrame] : "";
  document.getElementById("polaroidFrame").style.display = selectedFrame >= 0 ? "block" : "none";
  
  const wrap = document.getElementById("polaroidWrap");
  const card = document.getElementById("polaroidCard");
  wrap.classList.add("show");
  card.style.animation = "none";
  void card.offsetWidth;
  card.style.animation = "polaroidReveal 1.2s cubic-bezier(.17,.67,.35,1.3) forwards";
  
  wrap.scrollIntoView({ behavior: "smooth", block: "center" });
}

async function downloadPhoto() {
  const photo = document.getElementById("polaroidPhoto").src;
  const frameIdx = selectedFrame;

  // Composite onto a new canvas
  const img = new Image();
  img.src = photo;
  await new Promise(r => img.onload = r);

  const cw = img.width, ch = img.height;
  const offscreen = document.createElement("canvas");
  offscreen.width = cw; offscreen.height = ch;
  const ctx = offscreen.getContext("2d");
  ctx.drawImage(img, 0, 0);

  if (frameIdx >= 0) {
    const fi = new Image();
    fi.src = FRAMES[frameIdx];
    await new Promise(r => fi.onload = r);
    ctx.drawImage(fi, 0, 0, cw, ch);
  }

  const link = document.createElement("a");
  link.download = "twice-cam-" + Date.now() + ".jpg";
  link.href = offscreen.toDataURL("image/jpeg", 0.92);
  link.click();
}

function retake() {
  document.getElementById("polaroidWrap").classList.remove("show");
  video.style.display = "block";
  photoCanvas.style.display = "none";
}

// Init
startCamera();
initFrameStrip();
selectFrame(-1);
</script>
