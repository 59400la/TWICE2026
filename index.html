<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TWICE CAM ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Nunito',sans-serif;
  background:#87CEEB;
  display:flex;flex-direction:column;align-items:center;
  height:100dvh;overflow:hidden;position:relative;
}

#skyBg{position:fixed;inset:0;background-size:cover;background-position:center top;z-index:0;}

/* clouds */
@keyframes cldft{0%{transform:translateX(0)}100%{transform:translateX(16px)}}
.cloud{position:fixed;border-radius:50%;background:rgba(255,255,255,0.82);filter:blur(10px);pointer-events:none;z-index:1;}

/* HEADER */
@keyframes ttlFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.header{
position:relative;z-index:5;text-align:center;padding-top:16px;
font-family:‘Pacifico’,cursive;font-size:clamp(1.7rem,7vw,2.4rem);
color:white;text-shadow:2px 3px 0 #1a3acd,4px 5px 18px rgba(26,58,205,0.4);
letter-spacing:3px;animation:ttlFloat 4s ease-in-out infinite;
}
.sub{
position:relative;z-index:5;font-size:0.6rem;font-weight:700;
color:rgba(255,255,255,0.88);letter-spacing:5px;text-transform:uppercase;
margin-top:2px;margin-bottom:8px;
}

/* MAIN SCENE - fills remaining space */
.scene{
position:relative;z-index:5;
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
width:100%;overflow:hidden;
/* bottom padding = height of bottom bar */
padding-bottom:var(–bar-h,200px);
}

/* CAM WRAPPER - camera image + overlays */
.cam-wrap{
position:relative;
/* width controlled by JS */
flex-shrink:0;
cursor:pointer;
}

/* Camera image */
.cam-img{
display:block;width:100%;
position:relative;z-index:3;
filter:drop-shadow(0 10px 28px rgba(0,30,120,0.45));
animation:camFloat 3.5s ease-in-out infinite;
pointer-events:none;
}
@keyframes camFloat{
0%,100%{transform:translateY(0) rotate(0deg)}
30%{transform:translateY(-7px) rotate(1.5deg)}
70%{transform:translateY(-4px) rotate(-1deg)}
}

/* LENS PREVIEW - absolutely positioned over lens area */
.lens-wrap{
position:absolute;
border-radius:50%;
overflow:hidden;
z-index:2; /* behind camera image */
border:2px solid rgba(0,0,0,0.3);
}
.lens-video{
width:100%;height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}

/* PHOTO SLOT anchor - photo ejects upward from here */
.photo-slot{
position:absolute;
z-index:10;
/* left/top set by JS */
}

/* EJECTED PHOTO */
.ejected-photo{
position:absolute;
/* width set by JS, bottom=0 anchors to slot */
bottom:0;
transform:translateX(-50%);
display:none;
filter:drop-shadow(0 8px 20px rgba(0,0,60,0.4));
}
@keyframes ejectUp{
0%  {transform:translateX(-50%) translateY(40px) rotate(5deg);opacity:0;}
30% {transform:translateX(-50%) translateY(-160px) rotate(-2.5deg);opacity:1;}
55% {transform:translateX(-50%) translateY(-148px) rotate(1.2deg);opacity:1;}
100%{transform:translateX(-50%) translateY(-152px) rotate(-2deg);opacity:1;}
}
.ejected-photo.show{
display:block;
animation:ejectUp 1.3s cubic-bezier(.17,.67,.35,1.2) forwards;
}
.ejected-photo .photo-img{width:100%;display:block;}
.ejected-photo .frame-img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;pointer-events:none;}

/* Action buttons under photo */
.action-row{
position:absolute;
bottom:-40px;left:50%;transform:translateX(-50%);
display:none;gap:10px;white-space:nowrap;
}
.btn-dl{padding:7px 16px;border-radius:20px;border:none;cursor:pointer;font-family:‘Nunito’,sans-serif;font-weight:900;font-size:0.78rem;background:linear-gradient(135deg,#ff6eb4,#c9a0ff);color:white;box-shadow:0 3px 10px rgba(255,110,180,0.4);}
.btn-retake{padding:7px 14px;border-radius:20px;border:2px solid rgba(255,255,255,0.6);cursor:pointer;font-family:‘Nunito’,sans-serif;font-weight:900;font-size:0.78rem;background:rgba(255,255,255,0.22);color:white;backdrop-filter:blur(4px);}

/* BOTTOM BAR */
.bottom-bar{
position:fixed;bottom:0;left:0;right:0;z-index:20;
display:flex;flex-direction:column;align-items:center;
gap:8px;padding:8px 16px 16px;
background:linear-gradient(to top,rgba(130,180,220,0.97),rgba(130,180,220,0.6) 80%,transparent);
backdrop-filter:blur(12px);
}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;}
.ftab{
padding:5px 13px;border-radius:20px;
border:2px solid rgba(255,255,255,0.45);
background:rgba(255,255,255,0.18);color:white;
font-family:‘Nunito’,sans-serif;font-weight:700;font-size:0.7rem;
cursor:pointer;transition:all 0.18s;
}
.ftab.active{background:white;color:#1a3acd;border-color:white;}

/* ctrl row */
.ctrl-row{display:flex;align-items:center;gap:16px;}
.btn-icon{
width:46px;height:46px;border-radius:50%;
border:2px solid rgba(255,255,255,0.6);
background:rgba(255,255,255,0.22);color:white;font-size:1.2rem;
cursor:pointer;display:flex;align-items:center;justify-content:center;
backdrop-filter:blur(4px);transition:transform 0.15s;
}
.btn-icon:active{transform:scale(0.9);}
label.btn-icon{cursor:pointer;}
input[type=file]{display:none;}
.btn-shutter{
width:64px;height:64px;border-radius:50%;border:none;
background:linear-gradient(135deg,#ff6eb4,#ffaad6);
box-shadow:0 0 0 4px rgba(255,255,255,0.5),0 0 0 8px rgba(255,110,180,0.3),0 4px 18px rgba(255,110,180,0.65);
font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all 0.15s;
}
.btn-shutter:disabled{opacity:0.55;cursor:not-allowed;}

/* Frame strip */
.frame-strip{
display:flex;gap:7px;overflow-x:auto;padding:2px 4px;
width:100%;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
}
.frame-strip::-webkit-scrollbar{height:3px;}
.frame-strip::-webkit-scrollbar-thumb{background:rgba(255,110,180,0.5);border-radius:4px;}
.fthumb{
flex-shrink:0;width:44px;height:58px;border-radius:7px;overflow:hidden;
border:2.5px solid rgba(255,255,255,0.35);cursor:pointer;
background:rgba(255,255,255,0.2);
scroll-snap-align:start;transition:border-color 0.18s,transform 0.18s;
display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.fthumb img{width:100%;height:100%;object-fit:cover;}
.fthumb.sel{border-color:#ff6eb4;transform:scale(1.12);box-shadow:0 2px 8px rgba(255,110,180,0.5);}

/* Countdown */
.cnt-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cnt-num{font-family:‘Pacifico’,cursive;font-size:min(38vw,200px);color:white;text-shadow:0 0 50px rgba(255,110,180,0.9),0 5px 0 rgba(26,58,205,0.5);opacity:0;}
@keyframes cntPop{0%{opacity:1;transform:scale(1.3)}70%{opacity:1;transform:scale(.95)}100%{opacity:0;transform:scale(.5)}}
.cnt-num.show{animation:cntPop 0.88s forwards;}
.flash{position:fixed;inset:0;z-index:40;background:white;opacity:0;pointer-events:none;}
@keyframes flashIt{0%{opacity:1}100%{opacity:0}}
.flash.go{animation:flashIt 0.45s forwards;}
</style>

</head>
<body>

<div id="skyBg"></div>
<div class="cloud" style="top:5%;left:1%;width:130px;height:68px;animation:cldft 9s 0s ease-in-out infinite alternate;"></div>
<div class="cloud" style="top:14%;right:1%;width:170px;height:88px;animation:cldft 9s 1.5s ease-in-out infinite alternate;"></div>
<div class="cloud" style="top:32%;left:8%;width:105px;height:54px;animation:cldft 9s 3s ease-in-out infinite alternate;"></div>

<div class="header">TWICE</div>
<div class="sub">✦ This Is For ONCE ✦</div>

<div class="scene" id="scene">
  <div class="cam-wrap" id="camWrap" onclick="startCountdown()">
    <!-- Lens preview behind camera image -->
    <div class="lens-wrap" id="lensWrap">
      <video id="lensVideo" class="lens-video" autoplay playsinline muted></video>
    </div>
    <!-- Camera image on top of preview -->
    <img id="camImg" class="cam-img" src="" alt="TWICE instax">
    <!-- Photo slot anchor -->
    <div class="photo-slot" id="photoSlot">
      <div class="ejected-photo" id="ejectedPhoto">
        <img class="photo-img" id="photoImg" src="" alt="">
        <img class="frame-img" id="frameImg" src="" alt="">
        <div class="action-row" id="actionRow">
          <button class="btn-dl" onclick="event.stopPropagation();downloadPhoto()">💾 儲存</button>
          <button class="btn-retake" onclick="event.stopPropagation();retake()">🔁 重拍</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('normal',this)">🎨 彩色</button>
    <button class="ftab" onclick="setFilter('y2k',this)">💖 Y2K</button>
    <button class="ftab" onclick="setFilter('bw',this)">🖤 黑白</button>
  </div>
  <div class="ctrl-row">
    <button class="btn-icon" onclick="event.stopPropagation();flipCamera()">🔄</button>
    <button class="btn-shutter" id="shutterBtn" onclick="event.stopPropagation();startCountdown()">📷</button>
    <label class="btn-icon" onclick="event.stopPropagation()" for="uploadInput">🖼️</label>
    <input type="file" id="uploadInput" accept="image/*" onchange="handleUpload(event)">
  </div>
  <div class="frame-strip" id="frameStrip"></div>
</div>

<div class="cnt-overlay"><span class="cnt-num" id="cntNum"></span></div>
<div class="flash" id="flash"></div>
<canvas id="cap" style="display:none"></canvas>

const FRAME_NAMES = ['Bear ⭐', 'TIF Blue', 'Green Pola', 'Yellow Pola', 'Blue Pola', 'Purple TIF', 'Blue Line', '^3^ Pink'];


// Set bg + camera
document.getElementById("skyBg").style.backgroundImage = `url(${SKY_BG})`;
document.getElementById("camImg").src = CAM_IMG;

// PNG measurements (320×480):
// Body bbox: rows 240-441, cols 62-257
// Lens center: col=148, row=323, radius≈55px
// Photo slot: col=159, row=240 (top of body)
const PNG_W=320, PNG_H=480;
const LENS_X=148, LENS_Y=323, LENS_R=55;
const SLOT_X=159, SLOT_Y=240;

let stream=null, facingMode="user", curFilter="normal";
let selFrame=0, busy=false, lastCap=null;

// ── LAYOUT ──
function layout(){
  const bar = document.getElementById("bottomBar");
  const barH = bar.offsetHeight;
  document.getElementById("scene").style.paddingBottom = barH+"px";

  const sceneH = document.getElementById("scene").offsetHeight;
  const sceneW = document.getElementById("scene").offsetWidth;

  // Camera width = 80% of screen width, max 280px
  const camW = Math.min(sceneW * 0.78, 280);
  const camH = camW * (PNG_H / PNG_W); // = camW * 1.5
  const scale = camW / PNG_W;

  const wrap = document.getElementById("camWrap");
  wrap.style.width = camW + "px";
  wrap.style.height = camH + "px";

  // Lens
  const lx = LENS_X * scale;
  const ly = LENS_Y * scale;
  const lr = LENS_R * scale;
  const lensWrap = document.getElementById("lensWrap");
  lensWrap.style.left = (lx - lr) + "px";
  lensWrap.style.top  = (ly - lr) + "px";
  lensWrap.style.width  = (lr * 2) + "px";
  lensWrap.style.height = (lr * 2) + "px";

  // Photo slot
  const sx = SLOT_X * scale;
  const sy = SLOT_Y * scale;
  const slot = document.getElementById("photoSlot");
  slot.style.left = sx + "px";
  slot.style.top  = sy + "px";

  // Ejected photo width ≈ 65% of cam width
  const photoW = Math.round(camW * 0.65);
  document.getElementById("ejectedPhoto").style.width = photoW + "px";
}

window.addEventListener("load", layout);
window.addEventListener("resize", layout);

// ── FRAMES ──
function initFrames(){
  const strip = document.getElementById("frameStrip");
  strip.innerHTML = "";
  const none = document.createElement("div");
  none.className = "fthumb" + (selFrame===-1?" sel":"");
  none.id = "ft--1"; none.textContent = "🚫"; none.title = "無相框";
  none.onclick = e => { e.stopPropagation(); selectFrame(-1); };
  strip.appendChild(none);
  FRAMES.forEach((src,i)=>{
    const d = document.createElement("div");
    d.className = "fthumb" + (i===selFrame?" sel":"");
    d.id = "ft-"+i; d.title = FRAME_NAMES[i];
    const img = document.createElement("img");
    img.src = src; img.alt = FRAME_NAMES[i];
    d.appendChild(img);
    d.onclick = e => { e.stopPropagation(); selectFrame(i); };
    strip.appendChild(d);
  });
}
function selectFrame(i){
  selFrame = i;
  document.querySelectorAll(".fthumb").forEach(t=>t.classList.remove("sel"));
  document.getElementById("ft-"+i)?.classList.add("sel");
  const fi = document.getElementById("frameImg");
  if(i>=0){ fi.src=FRAMES[i]; fi.style.display="block"; }
  else fi.style.display="none";
}

// ── CAMERA ──
const lensVid = document.getElementById("lensVideo");
async function startCamera(fm){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:fm, width:{ideal:1280}, height:{ideal:1600}}, audio:false
    });
    lensVid.srcObject = stream;
    lensVid.onloadedmetadata = () => {
      lensVid.play().catch(()=>{});
      lensVid.style.transform = fm==="user" ? "scaleX(-1)" : "scaleX(1)";
    };
  }catch(e){ console.warn("Camera:",e); }
}
function flipCamera(){
  facingMode = facingMode==="user" ? "environment" : "user";
  startCamera(facingMode);
}

// ── FILTER ──
const filterCSS = {
  normal:"none",
  y2k:"brightness(1.15) saturate(1.3) contrast(0.92) sepia(0.08)",
  bw:"grayscale(100%) sepia(25%) contrast(1.1)"
};
function setFilter(f,el){
  curFilter = f;
  document.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  lensVid.style.filter = filterCSS[f];
}

// ── COUNTDOWN ──
function startCountdown(){
  if(busy) return;
  busy = true;
  document.getElementById("shutterBtn").disabled = true;
  let c = 3;
  const el = document.getElementById("cntNum");
  const tick = () => {
    el.textContent = c;
    el.classList.remove("show"); void el.offsetWidth; el.classList.add("show");
    if(c===0){
      setTimeout(async()=>{
        await capturePhoto();
        busy=false;
        document.getElementById("shutterBtn").disabled=false;
      }, 880);
      return;
    }
    c--; setTimeout(tick, 950);
  };
  tick();
}

// ── CAPTURE ──
async function capturePhoto(){
  const fl = document.getElementById("flash");
  fl.classList.remove("go"); void fl.offsetWidth; fl.classList.add("go");

  const v = lensVid;
  // Wait for real frame
  await new Promise(resolve=>{
    if(v.videoWidth>0 && v.readyState>=2){ resolve(); return; }
    let t=0;
    const id = setInterval(()=>{ t++;
      if((v.videoWidth>0&&v.readyState>=2)||t>30){ clearInterval(id); resolve(); }
    },100);
  });

  if(!v.videoWidth){ alert("相機未就緒，請允許相機權限後再試"); return; }

  const cv = document.getElementById("cap");
  cv.width=v.videoWidth; cv.height=v.videoHeight;
  const ctx = cv.getContext("2d");
  if(facingMode==="user"){ ctx.translate(cv.width,0); ctx.scale(-1,1); }
  ctx.drawImage(v,0,0);
  if(facingMode==="user") ctx.setTransform(1,0,0,1,0,0);
  applyFX(ctx, cv.width, cv.height);
  showPhoto(cv.toDataURL("image/jpeg",.92));
}

function applyFX(ctx,w,h){
  if(curFilter==="bw"){
    const id=ctx.getImageData(0,0,w,h),d=id.data;
    for(let i=0;i<d.length;i+=4){const g=d[i]*.299+d[i+1]*.587+d[i+2]*.114;d[i]=g;d[i+1]=g*.96;d[i+2]=g*.88;}
    ctx.putImageData(id,0,0);
  }else if(curFilter==="y2k"){
    const id=ctx.getImageData(0,0,w,h),d=id.data;
    for(let i=0;i<d.length;i+=4){d[i]=Math.min(255,d[i]*1.15+18);d[i+1]=Math.min(255,d[i+1]*1.1+8);d[i+2]=Math.min(255,d[i+2]*1.12+22);}
    ctx.putImageData(id,0,0);
    ctx.globalAlpha=.18;
    const gr=ctx.createRadialGradient(w*.3,h*.2,0,w*.5,h*.4,w*.7);
    gr.addColorStop(0,"rgba(255,240,200,1)");gr.addColorStop(.5,"rgba(255,180,220,.5)");gr.addColorStop(1,"rgba(220,200,255,0)");
    ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);ctx.globalAlpha=1;
  }
}

// ── SHOW PHOTO ──
function showPhoto(dataUrl){
  const fi = selFrame>=0 ? selFrame : Math.floor(Math.random()*FRAMES.length);
  lastCap = {dataUrl, fi};

  document.getElementById("photoImg").src = dataUrl;
  const fm = document.getElementById("frameImg");
  if(fi>=0){ fm.src=FRAMES[fi]; fm.style.display="block"; }
  else fm.style.display="none";

  const ep = document.getElementById("ejectedPhoto");
  ep.style.display="none"; void ep.offsetWidth;
  ep.style.display="block";
  ep.classList.remove("show"); void ep.offsetWidth;
  ep.classList.add("show");

  setTimeout(()=>{ document.getElementById("actionRow").style.display="flex"; }, 1350);
}

// ── UPLOAD ──
function handleUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.getElementById("cap");
      cv.width=img.width; cv.height=img.height;
      const ctx=cv.getContext("2d");
      ctx.drawImage(img,0,0);
      applyFX(ctx,img.width,img.height);
      showPhoto(cv.toDataURL("image/jpeg",.92));
    };
    img.src=ev.target.result;
  };
  rd.readAsDataURL(file);
}

// ── DOWNLOAD ──
async function downloadPhoto(){
  if(!lastCap) return;
  const {dataUrl,fi}=lastCap;
  const img=new Image(); img.src=dataUrl;
  await new Promise(r=>img.onload=r);
  const off=document.createElement("canvas");
  off.width=img.width; off.height=img.height;
  const ctx=off.getContext("2d");
  ctx.drawImage(img,0,0);
  if(fi>=0){
    const fm=new Image(); fm.src=FRAMES[fi];
    await new Promise(r=>{fm.onload=r;fm.onerror=r;});
    ctx.drawImage(fm,0,0,img.width,img.height);
  }
  const a=document.createElement("a");
  a.download="twice-cam-"+Date.now()+".jpg";
  a.href=off.toDataURL("image/jpeg",.92); a.click();
}

// ── RETAKE ──
function retake(){
  const ep=document.getElementById("ejectedPhoto");
  ep.classList.remove("show"); ep.style.display="none";
  document.getElementById("actionRow").style.display="none";
  lastCap=null;
}

initFrames();
startCamera(facingMode);
</script>
